bundle:
  name: financial-ai-mlops

include:
  - resources/*

artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: git_sha
    default: abcd
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED
  finnhub_api_key:
    description: Finnhub WebSocket API key
    default: ""
  alphavantage_api_key:
    description: Alpha Vantage REST API key
    default: ""
  stream_checkpoint_path:
    description: Streaming checkpoint base path
    default: /Workspace/checkpoints/financial-anomaly

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://<YOUR_WORKSPACE_ID>.x.gcp.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED

  acc:
    presets:
      name_prefix: 'acc_'
    workspace:
      host: https://<YOUR_WORKSPACE_ID>.x.gcp.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED

  prd:
    mode: production
    workspace:
      host: https://<YOUR_WORKSPACE_ID>.x.gcp.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED  # normally UNPAUSED
