bundle:
  name: financial-ai-mlops

include:
  - resources/*

artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: git_sha
    default: abcd
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED
  finnhub_api_key:
    description: Finnhub WebSocket API key
    default: ""
  alphavantage_api_key:
    description: Alpha Vantage REST API key
    default: ""
  stream_checkpoint_path:
    description: Streaming checkpoint base path
    default: /Workspace/checkpoints/financial-anomaly
  catalog_name:
    description: Unity Catalog name
    default: mlops_dev
  schema_name:
    description: Schema database name
    default: financial_transactions

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://8259560517811498.8.gcp.databricks.com
      root_path: ~/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED
      catalog_name: mlops_dev
      schema_name: financial_transactions

  acc:
    presets:
      name_prefix: 'acc_'
    workspace:
      host: https://8259560517811498.8.gcp.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED
      catalog_name: mlops_acc
      schema_name: financial_transactions

  prd:
    mode: production
    workspace:
      host: https://8259560517811498.8.gcp.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED  # normally UNPAUSED
      catalog_name: mlops_prd
      schema_name: financial_transactions
