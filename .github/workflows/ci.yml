name: CI Pipeline

on:
  workflow_dispatch:
  # push:
  #   branches: [main, develop]
  #   paths-ignore:
  #     - 'Operational_Documents/**'
  #     - '**/README.md'
  #     - 'README.md'
  # pull_request:
  #   branches: [main]
  #   paths-ignore:
  #     - 'Operational_Documents/**'
  #     - '**/README.md'
  #     - 'README.md'

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev,test]"

      - name: Lint with ruff
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Run unit tests
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE/src" python -m pytest tests/ -m "not ci_exclude" -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system ".[dev]"
          pip install bandit safety

      - name: Run Bandit security scan
        run: bandit -r src/ -ll --format json -o bandit-report.json || true

      - name: Check for known vulnerabilities
        run: safety check --json --output safety-report.json || true

      - name: Check for hardcoded secrets
        run: |
          # Ensure no API keys are committed
          if grep -rn "d77tikpr01qsamsi528g\|X6M0HI1TWKY7HK3E" src/ scripts/ tests/ 2>/dev/null; then
            echo "ERROR: Hardcoded API keys found!"
            exit 1
          fi
          echo "No hardcoded secrets found ✅"

  bundle-validate:
    name: Validate Databricks Bundle
    runs-on: ubuntu-latest
    environment: dev
    needs: lint-and-test
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Databricks secrets are present
        shell: bash
        run: |
          if [[ -z "${DATABRICKS_HOST}" ]]; then
            echo "::error::Missing DATABRICKS_HOST secret."
            exit 1
          fi
          if [[ -z "${DATABRICKS_TOKEN}" ]] && [[ -z "${DATABRICKS_CLIENT_ID}" || -z "${DATABRICKS_CLIENT_SECRET}" ]]; then
             echo "::error::Missing authentication secrets! Provide either DATABRICKS_TOKEN (for PAT) OR both DATABRICKS_CLIENT_ID and DATABRICKS_CLIENT_SECRET (for OAuth)."
             exit 1
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: databricks bundle validate -t dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Build wheel
        run: uv build

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*.whl
