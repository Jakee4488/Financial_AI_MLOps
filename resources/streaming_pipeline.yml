resources:
  pipelines:
    financial_streaming_pipeline:
      name: financial-streaming-dlt
      target: ${var.catalog_name}.${var.schema_name}
      development: true
      continuous: false  # Set to true for always-on streaming
      channel: "PREVIEW"
      edition: "ADVANCED"
      libraries:
        - notebook:
            path: ../src/financial_transactions/dlt/bronze_ingest.py
        - notebook:
            path: ../src/financial_transactions/dlt/silver_transform.py
        - notebook:
            path: ../src/financial_transactions/dlt/gold_features.py
      configuration:
        "spark.databricks.delta.enableChangeDataFeed": "true"
      clusters:
        - label: "default"
          autoscale:
            min_workers: 1
            max_workers: 4
