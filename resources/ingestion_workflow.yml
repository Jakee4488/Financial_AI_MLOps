resources:
  jobs:
    financial_historical_ingestion:
      name: financial-historical-ingestion
      tags:
        project: financial-ai-mlops
        pipeline: ingestion
      tasks:
        - task_key: collect_alphavantage_history
          spark_python_task:
            python_file: ../scripts/financial/collect_alphavantage_history.py
            parameters:
              - "--symbols"
              - "AAPL,MSFT,GOOGL,AMZN,TSLA"
              - "--interval"
              - "daily"
              - "--output-dir"
              - "/Volumes/${var.catalog_name}/${var.schema_name}/historical"
              - "--api-key"
              - "${var.alphavantage_api_key}"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
