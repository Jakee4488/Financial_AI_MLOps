resources:
  jobs:
    financial_api_ingestion_workflow:
      name: financial-api-ingestion-workflow
      tags:
        project: financial-ai-mlops
        pipeline: ingestion
      tasks:
        - task_key: collect_finnhub_stream
          spark_python_task:
            python_file: ../scripts/financial/collect_finnhub_stream.py
            parameters:
              - --duration
              - "300"
              - --symbols
              - AAPL,MSFT,GOOGL,AMZN,TSLA
              - --output
              - dbfs:/Volumes/${var.catalog_name}/${var.schema_name}/streaming_landing/trades
              - --batch-interval
              - "30"
              - --api-key
              - ${var.finnhub_api_key}
          environment_key: default
        - task_key: run_streaming_pipeline
          depends_on:
            - task_key: collect_finnhub_stream
          pipeline_task:
            pipeline_id: ${resources.pipelines.financial_streaming_pipeline.id}
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
