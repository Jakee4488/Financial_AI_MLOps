resources:
  jobs:
    financial_retraining_workflow:
      name: financial-retraining-workflow
      schedule:
        pause_status: ${var.schedule_pause_status}
      tags:
        project: financial-ai-mlops
        pipeline: retraining
      tasks:
        - task_key: train_tournament
          notebook_task:
            notebook_path: ../scripts/financial/train_tournament.py
            base_parameters:
              git_sha: ${var.git_sha}
              branch: ${var.branch}
          job_cluster_key: ml_cluster

        - task_key: deploy_model
          depends_on:
            - task_key: train_tournament
          notebook_task:
            notebook_path: ../scripts/financial/deploy_anomaly_model.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
          job_cluster_key: ml_cluster

      job_clusters:
        - job_cluster_key: ml_cluster
          new_cluster:
            spark_version: 15.4.x-cpu-ml-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
            spark_conf:
              "spark.databricks.delta.enableChangeDataFeed": "true"
